version: '3.8'

services:

  # ── FastAPI RAG backend ──────────────────────────────────────
  api:
    build: .
    container_name: documind-api
    ports:
      - "8000:8000"
    environment:
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_CHAT_DEPLOYMENT=${AZURE_OPENAI_CHAT_DEPLOYMENT}
      - AZURE_OPENAI_EMBED_DEPLOYMENT=${AZURE_OPENAI_EMBED_DEPLOYMENT}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME}
      - COHERE_API_KEY=${COHERE_API_KEY}
    volumes:
      - ./data:/app/data        # mount data folder
      - ./mlruns:/app/mlruns    # persist MLflow runs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── MLflow tracking server ───────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: documind-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      bash -c "pip install mlflow -q &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri /mlruns"
    restart: unless-stopped

  # ── Streamlit UI ─────────────────────────────────────────────
  ui:
    build: .
    container_name: documind-ui
    ports:
      - "8501:8501"
    environment:
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_CHAT_DEPLOYMENT=${AZURE_OPENAI_CHAT_DEPLOYMENT}
      - AZURE_OPENAI_EMBED_DEPLOYMENT=${AZURE_OPENAI_EMBED_DEPLOYMENT}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME}
      - COHERE_API_KEY=${COHERE_API_KEY}
    command: streamlit run src/streamlit_app.py
             --server.port 8501
             --server.address 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped